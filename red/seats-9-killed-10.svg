<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    .seat { stroke: black; stroke-width: 2; }
    .seat-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
    .pair { fill: yellow; stroke-dasharray: 4 4; }
    .target { fill: pink; }
    .known { fill: red; }
    .me { fill: darkred; stroke-width: 3; }
    .dead { fill: white; }
    .text-light { fill: black; }
    .text-dark { fill: white; }
    .x-mark { stroke: red; stroke-width: 3; stroke-linecap: round; stroke-opacity: 0.75; }
  </style>

  <circle cx="200" cy="50" r="25" class="seat pair"/>
  <text x="200" y="50" class="seat-text text-light">1</text>

  <circle cx="288" cy="79" r="25" class="seat pair"/>
  <text x="288" y="79" class="seat-text text-light">2</text>

  <circle cx="343" cy="154" r="25" class="seat pair"/>
  <text x="343" y="154" class="seat-text text-light">3</text>

  <circle cx="343" cy="246" r="25" class="seat pair"/>
  <text x="343" y="246" class="seat-text text-light">4</text>

  <circle cx="288" cy="321" r="25" class="seat target"/>
  <text x="288" y="321" class="seat-text text-light">5</text>

  <circle cx="200" cy="350" r="25" class="seat target"/>
  <text x="200" y="350" class="seat-text text-light">6</text>

  <circle cx="112" cy="321" r="25" class="seat target"/>
  <text x="112" y="321" class="seat-text text-light">7</text>

  <circle cx="57" cy="246" r="25" class="seat known"/>
  <text x="57" y="246" class="seat-text text-dark">8</text>

  <circle cx="57" cy="154" r="25" class="seat me"/>
  <text x="57" y="154" class="seat-text text-dark">9</text>

  <circle cx="112" cy="79" r="25" class="seat dead"/>
  <text x="112" y="79" class="seat-text text-light">10</text>
  <line x1="94" y1="61" x2="130" y2="97" class="x-mark"/>
  <line x1="130" y1="61" x2="94" y2="97" class="x-mark"/>
</svg>
